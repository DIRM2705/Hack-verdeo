<div class="mb-8 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
    <div>
        <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Residentes</h1>
        <p class="text-slate-500 mt-1">Consulta residentes, lotes y su estatus de pago.</p>

        <div class="mt-4 max-w-xs">
            <label for="resident-view-select" class="block text-xs font-semibold tracking-wide uppercase text-slate-500 mb-2">Vista de residentes</label>
            <select
                id="resident-view-select"
                class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400"
                aria-label="Filtro de residentes"
            >
                <option value="consumo" selected>Ver consumos</option>
                <option value="pago">Ver pagos</option>
                <option value="morosidad">Prediccion de morosidad</option>
            </select>
        </div>
    </div>

    <div class="flex gap-3 flex-wrap">
        <a href="{{ url_for('logout') }}" class="flex items-center gap-2 px-4 py-2 rounded-lg text-rose-700 bg-rose-50 hover:bg-rose-100 transition font-medium border border-rose-200">
            <i class="fa-solid fa-right-from-bracket"></i> Salir
        </a>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
    <div id="map" class="h-96 w-full rounded-xl border border-slate-200 lg:col-span-2"></div>

    <aside class="bg-white rounded-xl border border-slate-200 p-5 h-fit">
        <h2 class="text-lg font-semibold text-slate-800 mb-4">Simbologia</h2>

        <div class="rounded-lg border border-slate-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-500">
                    <tr>
                        <th class="text-left px-3 py-2 font-medium">Estado</th>
                        <th class="text-left px-3 py-2 font-medium">Símbolo</th>
                    </tr>
                </thead>
                <tbody id="legend-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </aside>
</div>

<script id="puntos-data" type="application/json">
    {{ puntos | tojson }}
</script>
