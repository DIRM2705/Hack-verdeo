<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="empresa-uuid" content="{{ empresa_uuid }}">
    <title>Empleados - Panel de Administración</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos adicionales para el módulo de empleados */
        .badge-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.65rem;
            border-radius: 9999px;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1px solid;
        }
        
        .badge-pill button {
            line-height: 1;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.6;
            margin-left: 4px;
        }
        
        .badge-pill button:hover {
            opacity: 1;
        }
        
        .avatar {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        
        .employee-row {
            transition: background 0.1s;
            cursor: pointer;
        }
        
        .employee-row:hover {
            background: #f1f5f9;
        }
        
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-row {
            animation: fadeSlide 0.25s ease both;
        }
        
        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        
        .modal-backdrop.open {
            opacity: 1;
            pointer-events: all;
        }
        
        .modal {
            background: #fff;
            border-radius: 1rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.18);
            padding: 2rem;
            transform: translateY(16px) scale(0.97);
            transition: transform 0.25s;
        }
        
        .modal-backdrop.open .modal {
            transform: translateY(0) scale(1);
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
        }
        
        .modal-close:hover {
            color: #475569;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 1.25rem;
            right: 1.25rem;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-size: 0.875rem;
            font-weight: 600;
            background: #1e293b;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        /* Acciones de tabla */
        .table-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.25rem;
        }
        
        .action-btn {
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            color: #94a3b8;
        }
        
        .action-btn:hover {
            background: #f1f5f9;
        }
        
        .action-btn.edit:hover {
            color: #2563eb;
        }
        
        .action-btn.badge:hover {
            color: #7c3aed;
        }
        
        .action-btn.delete:hover {
            background: #fef2f2;
            color: #e11d48;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 0;
        }
        
        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }
        
        .admin-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            padding: 0.375rem 0.875rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>Panel</h2>
        <button class="nav-btn" onclick="window.location.href='{{ url_for('dashboard', uuid_empresa=empresa_uuid) }}'">🏪 Mi Local</button>
        <button class="nav-btn active" onclick="window.location.href='{{ url_for('empleados_page', uuid_empresa=empresa_uuid) }}'">👥 Empleados</button>
        <button class="nav-btn" onclick="window.location.href='{{ url_for('normativas_page', uuid_empresa=empresa_uuid) }}#normativas'">📋 Normativas y Plagas</button>
    </aside>

    <main class="main-content">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <div>
                    <h1 style="font-size: 1.875rem; font-weight: 700; color: #0f172a;">Empleados</h1>
                    <p style="color: #64748b; margin-top: 0.25rem;">Registra empleados y gestiona sus badges y certificaciones.</p>
                </div>
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <span class="admin-badge"><i class="fa-solid fa-user"></i> Admin</span>
                    <button onclick="openModal('add')" class="btn-primary" style="display: flex; align-items: center; gap: 0.5rem;">
                        <i class="fa-solid fa-plus"></i> Nuevo empleado
                    </button>
                </div>
            </div>

            <!-- Buscador -->
            <div style="margin-bottom: 1.5rem;">
                <div style="position: relative; max-width: 400px;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.875rem;"></i>
                    <input type="text" id="search-input" placeholder="Buscar empleado por nombre, apellido o correo..." 
                           style="width: 100%; padding: 0.5rem 0.75rem 0.5rem 2.25rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.875rem;">
                </div>
            </div>

            <!-- Tabla de empleados -->
            <div style="background: white; border-radius: 0.75rem; border: 1px solid #e2e8f0; overflow: hidden;">
                <table style="width: 100%; font-size: 0.875rem;">
                    <thead style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                        <tr>
                            <th style="text-align: left; padding: 0.75rem 1.25rem; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">Empleado</th>
                            <th style="text-align: left; padding: 0.75rem 1.25rem; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase; display: none;">Badges</th>
                            <th style="text-align: left; padding: 0.75rem 1.25rem; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">Departamento</th>
                            <th style="text-align: left; padding: 0.75rem 1.25rem; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">Estatus</th>
                            <th style="padding: 0.75rem 1.25rem;"></th>
                        </tr>
                    </thead>
                    <tbody id="employees-tbody"></tbody>
                </table>
                <div id="empty-state" class="empty-state" style="display: none;">
                    <i class="fa-solid fa-user-slash"></i>
                    <p style="color: #94a3b8; font-weight: 500;">No se encontraron empleados</p>
                    <p style="color: #94a3b8; font-size: 0.75rem; margin-top: 0.25rem;">Intenta ajustar el filtro o agrega uno nuevo.</p>
                </div>
            </div>
            <p id="count-label" style="font-size: 0.75rem; color: #94a3b8; margin-top: 0.75rem;"></p>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal-backdrop" class="modal-backdrop">
        <div class="modal">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
                <h2 id="modal-title" style="font-size: 1.125rem; font-weight: 700; color: #0f172a;">Nuevo empleado</h2>
                <button onclick="closeModal()" class="modal-close">&times;</button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="hidden" id="edit-index">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <div>
                        <label style="display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem;">Nombre *</label>
                        <input type="text" id="f-nombre" placeholder="Juan" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem;">Apellido *</label>
                        <input type="text" id="f-apellido" placeholder="García" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;">
                    </div>
                </div>

                <div>
                    <label style="display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem;">Correo *</label>
                    <input type="email" id="f-correo" placeholder="juan@empresa.com" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <div>
                        <label style="display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem;">Departamento</label>
                        <select id="f-dept" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;">
                            <option value="">— Seleccionar —</option>
                            <option>Ingeniería</option>
                            <option>Diseño</option>
                            <option>Ventas</option>
                            <option>Recursos Humanos</option>
                            <option>Operaciones</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem;">Estatus</label>
                        <select id="f-estatus" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                            <option value="Licencia">Licencia</option>
                        </select>
                    </div>
                </div>

                <!-- Badges -->
                <div>
                    <label style="display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 0.5rem;">Badges</label>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <select id="f-badge-select" style="flex: 1; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem;">
                            <option value="">— Agregar badge —</option>
                        </select>
                        <button onclick="addBadgeFromSelect()" style="padding: 0.5rem 0.75rem; border-radius: 0.5rem; background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; font-size: 0.875rem; font-weight: 600; cursor: pointer;">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                    <div id="f-badges-container" style="display: flex; flex-wrap: wrap; gap: 0.5rem;"></div>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.75rem; padding-top: 1.25rem; border-top: 1px solid #f1f5f9;">
                <button onclick="closeModal()" style="padding: 0.5rem 1rem; border-radius: 0.5rem; background: transparent; border: none; cursor: pointer; color: #475569; font-size: 0.875rem; font-weight: 500;">
                    Cancelar
                </button>
                <button onclick="saveEmployee()" style="padding: 0.5rem 1.25rem; border-radius: 0.5rem; background: #2563eb; border: none; cursor: pointer; color: white; font-size: 0.875rem; font-weight: 600;">
                    <i class="fa-solid fa-floppy-disk"></i> Guardar
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <i id="toast-icon" class="fa-solid fa-circle-check"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
        // Datos del servidor (Flask)
        const empresaUUID = '{{ empresa_uuid }}';
        
        // Configuración de badges disponibles
        const BADGES_CATALOG = [
            { id: 'lider', label: 'Líder', color: 'bg-violet-50 text-violet-700 border-violet-200', icon: 'fa-star' },
            { id: 'mentor', label: 'Mentor', color: 'bg-amber-50 text-amber-700 border-amber-200', icon: 'fa-graduation-cap' },
            { id: 'fullstack', label: 'Full Stack', color: 'bg-blue-50 text-blue-700 border-blue-200', icon: 'fa-code' },
            { id: 'qa', label: 'QA', color: 'bg-teal-50 text-teal-700 border-teal-200', icon: 'fa-bug' },
            { id: 'agile', label: 'Agile', color: 'bg-emerald-50 text-emerald-700 border-emerald-200', icon: 'fa-arrows-spin' },
            { id: 'cloud', label: 'Cloud', color: 'bg-sky-50 text-sky-700 border-sky-200', icon: 'fa-cloud' },
            { id: 'seguridad', label: 'Seguridad', color: 'bg-rose-50 text-rose-700 border-rose-200', icon: 'fa-shield-halved' },
            { id: 'diseño', label: 'Diseño UX', color: 'bg-pink-50 text-pink-700 border-pink-200', icon: 'fa-pen-ruler' },
            { id: 'ventas', label: 'Top Ventas', color: 'bg-orange-50 text-orange-700 border-orange-200', icon: 'fa-trophy' },
            { id: 'innovador', label: 'Innovador', color: 'bg-indigo-50 text-indigo-700 border-indigo-200', icon: 'fa-lightbulb' }
        ];
        
        const STATUS_STYLES = {
            'Activo': 'bg-emerald-50 text-emerald-700 border-emerald-200',
            'Inactivo': 'bg-slate-100 text-slate-500 border-slate-200',
            'Licencia': 'bg-amber-50 text-amber-700 border-amber-200'
        };
        
        const AVATAR_COLORS = [
            'bg-blue-100 text-blue-700', 'bg-violet-100 text-violet-700',
            'bg-emerald-100 text-emerald-700', 'bg-amber-100 text-amber-700',
            'bg-rose-100 text-rose-700', 'bg-teal-100 text-teal-700'
        ];
        
        let employees = [];
        let modalBadges = [];
        
        // Helper functions
        function getBadge(id) {
            return BADGES_CATALOG.find(b => b.id === id);
        }
        
        function avatarColor(name) {
            const idx = (name.charCodeAt(0) + (name.charCodeAt(1) || 0)) % AVATAR_COLORS.length;
            return AVATAR_COLORS[idx];
        }
        
        function showToast(msg, success = true) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msgSpan = document.getElementById('toast-msg');
            msgSpan.textContent = msg;
            icon.className = success ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-exclamation';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2800);
        }
        
        // Render table
        function renderTable() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const tbody = document.getElementById('employees-tbody');
            const emptyDiv = document.getElementById('empty-state');
            const countLabel = document.getElementById('count-label');
            
            const filtered = employees.filter(emp => {
                const fullName = `${emp.nombre} ${emp.apellido} ${emp.correo}`.toLowerCase();
                return fullName.includes(searchTerm);
            });
            
            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyDiv.style.display = 'block';
                countLabel.textContent = '';
                return;
            }
            
            emptyDiv.style.display = 'none';
            
            filtered.forEach((emp, idx) => {
                const initials = (emp.nombre[0] || '') + (emp.apellido[0] || '');
                const avatarCls = avatarColor(emp.nombre);
                const statusClass = STATUS_STYLES[emp.estatus] || STATUS_STYLES['Activo'];
                
                const tr = document.createElement('tr');
                tr.className = 'employee-row';
                tr.style.animation = 'fadeSlide 0.25s ease both';
                tr.style.animationDelay = `${idx * 40}ms`;
                
                tr.innerHTML = `
                    <td style="padding: 0.875rem 1.25rem;">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <div class="avatar ${avatarCls}">${initials}</div>
                            <div>
                                <p style="font-weight: 600; color: #0f172a;">${escapeHtml(emp.nombre)} ${escapeHtml(emp.apellido)}</p>
                                <p style="font-size: 0.75rem; color: #64748b;">${escapeHtml(emp.correo)}</p>
                            </div>
                        </div>
                    </td>
                    <td style="padding: 0.875rem 1.25rem; color: #475569;">
                        ${escapeHtml(emp.dept || '—')}
                    </td>
                    <td style="padding: 0.875rem 1.25rem;">
                        <span class="badge-pill ${statusClass}">${emp.estatus || 'Activo'}</span>
                    </td>
                    <td style="padding: 0.875rem 1.25rem;">
                        <div class="table-actions">
                            <button onclick="openModal('edit', ${employees.indexOf(emp)})" class="action-btn edit" title="Editar">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button onclick="openBadgeManager(${employees.indexOf(emp)})" class="action-btn badge" title="Gestionar badges">
                                <i class="fa-solid fa-tag"></i>
                            </button>
                            <button onclick="deleteEmployee(${employees.indexOf(emp)})" class="action-btn delete" title="Eliminar">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            countLabel.textContent = `${filtered.length} empleado${filtered.length !== 1 ? 's' : ''}`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function filterTable() {
            renderTable();
        }
        
        // Badge management in modal
        function initBadgeSelect() {
            const sel = document.getElementById('f-badge-select');
            sel.innerHTML = '<option value="">— Agregar badge —</option>';
            BADGES_CATALOG.forEach(b => {
                sel.innerHTML += `<option value="${b.id}">${b.label}</option>`;
            });
        }
        
        function renderModalBadges() {
            const container = document.getElementById('f-badges-container');
            if (modalBadges.length === 0) {
                container.innerHTML = '<span style="font-size: 0.75rem; color: #94a3b8;">Sin badges asignados</span>';
                return;
            }
            container.innerHTML = modalBadges.map(id => {
                const b = getBadge(id);
                if (!b) return '';
                return `
                    <span class="badge-pill ${b.color}">
                        <i class="fa-solid ${b.icon}"></i>${b.label}
                        <button type="button" onclick="removeBadge('${id}')">&times;</button>
                    </span>
                `;
            }).join('');
        }
        
        function addBadgeFromSelect() {
            const sel = document.getElementById('f-badge-select');
            const val = sel.value;
            if (!val) return;
            if (modalBadges.includes(val)) {
                showToast('Badge ya agregado', false);
                sel.value = '';
                return;
            }
            modalBadges.push(val);
            sel.value = '';
            renderModalBadges();
        }
        
        function removeBadge(id) {
            modalBadges = modalBadges.filter(b => b !== id);
            renderModalBadges();
        }
        
        // Modal CRUD
        function openModal(mode, idx = null) {
            const backdrop = document.getElementById('modal-backdrop');
            const title = document.getElementById('modal-title');
            modalBadges = [];
            
            if (mode === 'edit' && idx !== null) {
                const emp = employees[idx];
                title.textContent = 'Editar empleado';
                document.getElementById('edit-index').value = idx;
                document.getElementById('f-nombre').value = emp.nombre;
                document.getElementById('f-apellido').value = emp.apellido;
                document.getElementById('f-correo').value = emp.correo;
                document.getElementById('f-dept').value = emp.dept || '';
                document.getElementById('f-estatus').value = emp.estatus || 'Activo';
                modalBadges = [...(emp.badges || [])];
            } else {
                title.textContent = 'Nuevo empleado';
                document.getElementById('edit-index').value = '';
                document.getElementById('f-nombre').value = '';
                document.getElementById('f-apellido').value = '';
                document.getElementById('f-correo').value = '';
                document.getElementById('f-dept').value = '';
                document.getElementById('f-estatus').value = 'Activo';
            }
            
            renderModalBadges();
            backdrop.classList.add('open');
        }
        
        function openBadgeManager(idx) {
            openModal('edit', idx);
        }
        
        function closeModal() {
            document.getElementById('modal-backdrop').classList.remove('open');
        }
        
        function saveEmployee() {
            const nombre = document.getElementById('f-nombre').value.trim();
            const apellido = document.getElementById('f-apellido').value.trim();
            const correo = document.getElementById('f-correo').value.trim();
            const dept = document.getElementById('f-dept').value;
            const estatus = document.getElementById('f-estatus').value;
            const idx = document.getElementById('edit-index').value;
            
            if (!nombre || !apellido || !correo) {
                showToast('Nombre, apellido y correo son obligatorios.', false);
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) {
                showToast('Correo inválido.', false);
                return;
            }
            
            const emp = { nombre, apellido, correo, dept, estatus, badges: [...modalBadges] };
            
            if (idx !== '') {
                employees[parseInt(idx)] = emp;
                showToast('Empleado actualizado');
            } else {
                employees.unshift(emp);
                showToast('Empleado registrado');
            }
            
            closeModal();
            renderTable();
        }
        
        function deleteEmployee(idx) {
            if (!confirm(`¿Eliminar a ${employees[idx].nombre} ${employees[idx].apellido}?`)) return;
            employees.splice(idx, 1);
            renderTable();
            showToast('Empleado eliminado', false);
        }
        
        // Load data from server
        async function loadEmployees() {
            try {
                const response = await fetch(`/api/empleados/${empresaUUID}`);
                const data = await response.json();
                if (data && data.length > 0 && data[0].empleados) {
                    employees = data[0].empleados.map(emp => ({
                        uuid: emp.uuid,
                        nombre: emp.nombre,
                        apellido: emp.apellidos || '',
                        correo: '',
                        dept: '',
                        estatus: 'Activo',
                        badges: [],
                        icono_url: emp.icono_url
                    }));
                } else {
                    // Datos de ejemplo si no hay en la BD
                    employees = [
                        { nombre: 'Ana', apellido: 'García', correo: 'ana.garcia@empresa.com', dept: 'Ingeniería', estatus: 'Activo', badges: ['lider', 'fullstack'] },
                        { nombre: 'Carlos', apellido: 'López', correo: 'carlos.lopez@empresa.com', dept: 'Diseño', estatus: 'Activo', badges: ['diseño', 'innovador'] },
                        { nombre: 'María', apellido: 'Martínez', correo: 'maria.martinez@empresa.com', dept: 'Ventas', estatus: 'Activo', badges: ['ventas'] }
                    ];
                }
                renderTable();
            } catch (error) {
                console.error('Error loading employees:', error);
                // Datos de ejemplo
                employees = [
                    { nombre: 'Ana', apellido: 'García', correo: 'ana.garcia@empresa.com', dept: 'Ingeniería', estatus: 'Activo', badges: ['lider', 'fullstack'] },
                    { nombre: 'Carlos', apellido: 'López', correo: 'carlos.lopez@empresa.com', dept: 'Diseño', estatus: 'Activo', badges: ['diseño', 'innovador'] },
                    { nombre: 'María', apellido: 'Martínez', correo: 'maria.martinez@empresa.com', dept: 'Ventas', estatus: 'Activo', badges: ['ventas'] }
                ];
                renderTable();
            }
        }
        
        // Event listeners
        document.getElementById('search-input').addEventListener('input', filterTable);
        
        // Initialize
        initBadgeSelect();
        loadEmployees();
    </script>
</body>
</html>
